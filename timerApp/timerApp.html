<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>

  <body class="bg-black">
    <div
      class="w-50 h-50 bg-[#FA008A] m-50 border-2 border-blue-600 drop-shadow-[0_0_1rem_rgb(31,81,255)] rounded-xl flex flex-col justify-center items-center"
    >
      <div class="flex flex-col gap-y-6">
        <div class="flex justify-center items-center bg-pink-400 rounded-4xl ">
          <input
            type="text"
            id="hourVal"
            oninput="validHour(this)"
            placeholder="00"
            class="w-12 h-12 text-center text-2xl text-[#1f51ff]"
          />
          <span
            ><svg
              fill="#1f51ff"
              width="4px"
              class="mt-1"
              height="12px"
              viewBox="8 9 3 17"
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <title>colon</title>
                <path
                  d="M8.406 9.688h2.406v2.406h-2.406v-2.406zM8.406 23.031h2.406v2.406h-2.406v-2.406z"
                ></path>
              </g></svg
          ></span>
          <input
            type="text"
            id="minVal"
            oninput="validMinSec(this)"
            placeholder="00"
            class="w-12 h-12 text-center text-2xl text-[#1f51ff]"
          />
          <span
            ><svg
              class="mt-1"
              fill="#1f51ff"
              width="2px"
              height="12px"
              viewBox="8 9 3 17"
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <title>colon</title>
                <path
                  d="M8.406 9.688h2.406v2.406h-2.406v-2.406zM8.406 23.031h2.406v2.406h-2.406v-2.406z"
                ></path>
              </g></svg
          ></span>
          <input
            type="text"
            id="secVal"
            oninput="validMinSec(this)"
            placeholder="00"
            class="w-12 h-12 text-center text-2xl text-[#1f51ff]"
          />
        </div>
        <div class="flex justify-center items-center gap-7">
          <button
            id="pauseStart"
            type="button"
            data-active="false";
            class="group w-9 h-9 bg-pink-400 rounded-4xl p-2 hover:cursor-pointer hover:bg-blue-300 flex items-center justify-center"
          >
            <svg
              class="group-data-[active=true]:hidden"
              width="25px"
              height="25px"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <path
                  d="M21.4086 9.35258C23.5305 10.5065 23.5305 13.4935 21.4086 14.6474L8.59662 21.6145C6.53435 22.736 4 21.2763 4 18.9671L4 5.0329C4 2.72368 6.53435 1.26402 8.59661 2.38548L21.4086 9.35258Z"
                  fill="#1f51ff"
                ></path>
              </g>
            </svg>
            <svg
              class="group-data-[active=true]:flex group-data-[active=false]:hidden transition-all"
              width="25px"
              height="25px"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <path
                  d="M2 6C2 4.11438 2 3.17157 2.58579 2.58579C3.17157 2 4.11438 2 6 2C7.88562 2 8.82843 2 9.41421 2.58579C10 3.17157 10 4.11438 10 6V18C10 19.8856 10 20.8284 9.41421 21.4142C8.82843 22 7.88562 22 6 22C4.11438 22 3.17157 22 2.58579 21.4142C2 20.8284 2 19.8856 2 18V6Z"
                  fill="#1f51ff"
                ></path>
                <path
                  d="M14 6C14 4.11438 14 3.17157 14.5858 2.58579C15.1716 2 16.1144 2 18 2C19.8856 2 20.8284 2 21.4142 2.58579C22 3.17157 22 4.11438 22 6V18C22 19.8856 22 20.8284 21.4142 21.4142C20.8284 22 19.8856 22 18 22C16.1144 22 15.1716 22 14.5858 21.4142C14 20.8284 14 19.8856 14 18V6Z"
                  fill="#1f51ff"
                ></path>
              </g>
            </svg>
          </button>
          <button
            id="restart"
            type="button"
            class="w-9 h-9 bg-pink-400 rounded-4xl hover:cursor-pointer p-1 hover:bg-blue-300 flex items-center justify-center"
          >
            <svg
              width="25px"
              height="25px"
              viewBox="0 0 15 15"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M4.85355 2.14645C5.04882 2.34171 5.04882 2.65829 4.85355 2.85355L3.70711 4H9C11.4853 4 13.5 6.01472 13.5 8.5C13.5 10.9853 11.4853 13 9 13H5C4.72386 13 4.5 12.7761 4.5 12.5C4.5 12.2239 4.72386 12 5 12H9C10.933 12 12.5 10.433 12.5 8.5C12.5 6.567 10.933 5 9 5H3.70711L4.85355 6.14645C5.04882 6.34171 5.04882 6.65829 4.85355 6.85355C4.65829 7.04882 4.34171 7.04882 4.14645 6.85355L2.14645 4.85355C1.95118 4.65829 1.95118 4.34171 2.14645 4.14645L4.14645 2.14645C4.34171 1.95118 4.65829 1.95118 4.85355 2.14645Z"
                  fill="#1f51ff"
                ></path>
              </g>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script src="timerApp.js"></script>
  </body>
</html>
